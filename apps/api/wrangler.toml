name = "car-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
# Non-secret config goes here.
# Secrets: use `wrangler secret put <NAME>` for prod; `.dev.vars` for local dev.

# Uncomment after `wrangler d1 create car-auth` and paste the returned id.
# [[d1_databases]]
# binding = "DB"
# database_name = "car-auth"
# database_id = ""

# Uncomment after `wrangler kv namespace create SESSIONS` and paste the returned id.
# [[kv_namespaces]]
# binding = "SESSIONS"
# id = ""
